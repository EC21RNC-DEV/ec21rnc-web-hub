version: '3.8'

services:
  api:
    build: ./api-server
    container_name: ec21rnc-admin-api
    restart: unless-stopped
    volumes:
      - ./api-server/data:/app/data
      - ./dynamic-nginx:/app/dynamic-nginx
    networks:
      - web

  proxy:
    image: nginx:latest
    container_name: ec21rnc-hub-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./html:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./dynamic-nginx:/etc/nginx/conf.d/dynamic
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # 2초마다 reload 신호 확인 + 6시간마다 인증서 갱신 reload
    command: >-
      /bin/sh -c '
        while :; do sleep 6h && nginx -s reload; done &
        while :; do
          if [ -f /etc/nginx/conf.d/dynamic/.reload ]; then
            if nginx -t 2>&1; then
              nginx -s reload;
              echo "[reload] nginx reloaded successfully";
            else
              echo "[reload] ERROR: nginx config test failed";
            fi;
            rm -f /etc/nginx/conf.d/dynamic/.reload || true;
            sleep 10;
          else
            sleep 2;
          fi;
        done &
        nginx -g "daemon off;"
      '
    depends_on:
      - certbot
      - api
    networks:
      - web

  certbot:
    image: certbot/certbot
    container_name: ec21rnc-certbot
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/lib/letsencrypt:/var/lib/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./dynamic-nginx:/var/lib/certbot/signals
    entrypoint: /bin/sh -c "trap exit TERM; echo '[certbot] Starting...'; while :; do if [ -f /var/lib/certbot/signals/.renew-ssl ]; then echo '[certbot] New domains detected...'; DOMAINS=$$(cat /var/lib/certbot/signals/.renew-ssl); certbot certonly --webroot --webroot-path=/var/www/certbot --cert-name ec21rnc-agent.com --email sean@ec21rnc.com --agree-tos --no-eff-email --non-interactive --force-renewal $$DOMAINS && echo '[certbot] Success' && touch /var/lib/certbot/signals/.reload || echo '[certbot] FAILED'; rm -f /var/lib/certbot/signals/.renew-ssl; sleep 30; else sleep 5; fi; done & while :; do certbot renew --webroot --webroot-path=/var/www/certbot --email sean@ec21rnc.com --agree-tos --no-eff-email; sleep 12h & wait $$!; done"
    networks:
      - web

networks:
  web:
    driver: bridge