# =================================================================
# EC21RNC Agent Hub - 수정된 Nginx 설정 (OpenWebUI/Streamlit 지원)
# =================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 로그 포맷
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 성능 최적화
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip 압축
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # 1. HTTP(80) 서버: 인증 처리 및 HTTPS 리다이렉션
    server {
        listen 80;
        server_name ec21rnc-agent.com *.ec21rnc-agent.com;

        # Certbot (Let's Encrypt) 인증 요청 처리
        location ~ /.well-known/acme-challenge/ {
            allow all;
            root /var/www/certbot;
        }

        # 나머지 모든 요청은 HTTPS로 리다이렉트
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 2. 메인 HTTPS 서버
    server {
        listen 443 ssl http2;
        server_name ec21rnc-agent.com;

        # SSL 인증서 설정
        ssl_certificate /etc/letsencrypt/live/ec21rnc-agent.com-0001/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ec21rnc-agent.com-0001/privkey.pem;

        # SSL 보안 설정
        ssl_session_cache shared:le_nginx_SSL:10m;
        ssl_session_timeout 1440m;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Content-Security-Policy "upgrade-insecure-requests" always;

        # --- Admin API 프록시 (OpenWebUI /api/ 보다 먼저 매칭) ---
        location /api/admin/ {
            proxy_pass http://api:3001/api/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
        }

        # --- 정적 에셋 (Vite 해시 파일명 → 장기 캐시) ---
        location /assets/ {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            access_log off;
        }

        # --- 정적 페이지 (브리핑, 문서 등) ---
        location /pages/ {
            root /usr/share/nginx/html;
            try_files $uri =404;
            add_header Cache-Control "no-cache" always;
        }

        # --- 메인 대시보드 ---
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # index.html은 항상 서버에서 새로 받기 (캐시 방지)
            location = /index.html {
                add_header Cache-Control "no-cache, no-store, must-revalidate" always;
                add_header Pragma "no-cache" always;
                add_header Expires "0" always;
            }
        }

        # --- 레거시 URL 리다이렉트 ---
        location = /static/briefing.html {
            return 301 $scheme://$host/pages/agri-export/briefing.html;
        }

        # --- 동적 커스텀 서비스 (subpath → subdomain 리다이렉트) ---
        include /etc/nginx/conf.d/dynamic/*.conf;

        # 에러 페이지 설정
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # --- SPA 서브도메인 서버 블록 (동적 생성) ---
    include /etc/nginx/conf.d/dynamic/spa-subdomains.inc;
}
